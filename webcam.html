<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Emotion Classifier</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #0f0f14 0%, #1a1a24 100%);
            color: #eee;
            margin: 0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            color: #f5f5f5;
        }

        .video-wrapper {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(42, 9, 133, 0.5);
            border: 1px solid #20084e;
        }

        video {
            display: block;
            transform: scaleX(-1);
        }

        @keyframes pulse {
            0%   { opacity: 1; transform: scale(1); }
            50%  { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result-card {
            margin-top: 28px;
            width: 480px;
            max-width: 90vw;
            background: #20084e;
            border: 1px solid #320d77;
            border-radius: 14px;
            padding: 24px 28px;
            text-align: center;
        }

        #emotion {
            font-size: 32px;
            font-weight: 700;
            transition: opacity 0.25s ease, color 0.25s ease;
        }

        .bar-track {
            margin-top: 16px;
            background: #2a2a35;
            border-radius: 25px;
            height: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        #confidence-label {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
        }

        /* --- Side panel --- */
        .gallery-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 640px;
            background: #17171f;
            border-left: 1px solid #2a2a35;
            box-shadow: -8px 0 30px rgba(0,0,0,0.4);
            transform: translateX(100%);   /* hidden by default, slid off-screen */
            transition: transform 0.3s ease;
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        .gallery-panel.open {
            transform: translateX(0);   /* slides into view */
        }

        .gallery-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            transform: none;
            background: #320d778a;
            border: 1px solid #320d77;
            border-radius: 10px;
            color: #eee;
            padding: 10px 16px;
            cursor: pointer;
            z-index: 101;
            writing-mode: horizontal-tb;
            font-size: 13px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .gallery-toggle:hover {
            background: #23232f;
        }

        .gallery-panel h3 {
            font-size: 15px;
            color: #ccc;
            margin-top: 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .gallery-thumb {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .gallery-thumb:hover {
            border-color: #5b8def;
            transform: scale(1.03);
        }

        .gallery-item-label {
            font-size: 10px;
            color: #999;
            text-align: center;
            margin-top: 2px;
        }

        /* --- Full-size lightbox overlay --- */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            flex-direction: column;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 85vw;
            max-height: 75vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .lightbox-caption {
            color: #eee;
            margin-top: 16px;
            font-size: 16px;
        }

        .lightbox-actions {
            margin-top: 14px;
            display: flex;
            gap: 12px;
        }

        .lightbox-actions a, .lightbox-actions button {
            background: #1c1c26;
            border: 1px solid #2a2a35;
            color: #eee;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            font-size: 13px;
        }

        .lightbox-actions a:hover, .lightbox-actions button:hover {
            background: #23232f;
        }

        .preview-card {
            position: fixed;
            top: 70px; 
            right: 20px;
            background: #1c1c26;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            z-index: 99;
            display: none;  
        }

        .preview-card img {
            width: 240px;
            height: 180px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        .preview-card .preview-label {
            font-size: 11px;
            color: #ccc;
            margin-top: 6px;
        }

        canvas { display: none; }
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }

            .video-wrapper video {
                width: 100%;
                height: auto;
                max-width: 100%;
            }

            canvas { display: none; }

            .result-card {
                width: 100%;
            }

            /* Toggle button: slightly bigger tap target */
            .gallery-toggle {
                padding: 12px 18px;
                font-size: 14px;
            }

            /* Preview card: move it below the toggle button with more clearance,
            and shrink it slightly so it doesn't dominate a small screen */
            .preview-card {
                position: static;   /* removes it from fixed positioning, back into normal document flow */
                margin-top: 40px;
                width: 100%;
                top: auto;
                right: auto;
            }

            .preview-card img {
                width: 100%;
                max-width: 240px;
                height: auto;
                aspect-ratio: 4/3;
                margin: 0 auto;
            }

            /* Gallery panel: full-screen overlay instead of a narrow side strip */
            .gallery-panel {
                width: 100%;
                height: 100%;
                transform: translateY(100%);   /* slide up from bottom instead of in from the side */
                border-left: none;
                border-top: 1px solid #2a2a35;
            }
            .gallery-panel.open {
                transform: translateY(0);
            }

            /* More columns since we now have full screen width to work with */
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            /* Lightbox: images can take up more of the screen since there's no
            side panel competing for space */
            .lightbox img {
                max-width: 92vw;
                max-height: 65vh;
            }

            .lightbox-actions {
                flex-direction: column;
                width: 80%;
            }
            .lightbox-actions a, .lightbox-actions button {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
        }

    </style>
</head>
<body>
    <h1>Live Emotion Detection</h1>

    <div class="video-wrapper">
        <video id="video" autoplay muted style="width:480px; max-width:100%; height:auto;"></video>
    </div>

    <canvas id="canvas" width="480" height="360"></canvas>

    <div class="result-card">
        <div id="emotion">Waiting for camera...</div>
        <div class="bar-track">
            <div id="bar-fill" class="bar-fill" style="width:0%; background:#555;"></div>
        </div>
        <div id="confidence-label"></div>
    </div>

    <button class="gallery-toggle" onclick="toggleGallery()">GALLERY</button>

    <div class="gallery-panel" id="galleryPanel">
        <h3>Memorable moments</h3>
        <div class="gallery-grid" id="gallery"></div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightboxOnBackdrop(event)">
        <img id="lightboxImg" src="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <div class="lightbox-actions">
            <a id="lightboxDownload" href="" download>Download</a>
            <button onclick="closeLightbox()">Close</button>
        </div>
    </div>

    <div class="preview-card" id="previewCard">
        <img id="previewImg" src="" onclick="">
        <div class="preview-label" id="previewLabel"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const emotionEl = document.getElementById('emotion');
        const barFill = document.getElementById('bar-fill');
        const confidenceLabel = document.getElementById('confidence-label');

        const emotionColors = {
            Angry: '#e05c5c', Disgust: '#8bc34a', Fear: '#9b6dd6',
            Happy: '#f5c518', Sad: '#5b56a8', Surprise: '#619ee8', Neutral: '#ffffff',
        };

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                emotionEl.textContent = "Detecting...";
            })
            .catch(err => {
                emotionEl.textContent = "Camera access denied or unavailable.";
                console.error(err);
            });

        setInterval(() => { captureAndPredict(); }, 1000);

        function captureAndPredict() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => { sendToServer(blob); }, 'image/jpeg');
        }

        const confidenceThreshold = 0.9;
        const NiceEmotions = ["Angry","Disgust","Fear","Sad","Surprise"]
        const gallery = document.getElementById('gallery');
        const coolDown = 3000; //3000ms 
        let lastSaved  = 0;

        console.log("Gallery element:", gallery);
        async function sendToServer(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'frame.jpg');
            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                updateUI(data.Emotion, data.confidence);

                const now = Date.now();
                const canSave = (now - lastSaved) >= coolDown ;
                if((data.confidence >= confidenceThreshold || NiceEmotions.includes(data.Emotion)) && canSave){
                    console.log("Adding to gallery:", data.Emotion, data.confidence);
                    addToGallery(blob, data.Emotion, data.confidence);
                    lastSaved = now;
                }
            } catch (err) {
                emotionEl.textContent = "Error contacting server.";
                console.error(err);
            }
        }

        function updateUI(emotion, confidence) {
            const color = emotionColors[emotion] || '#eee';
            const percent = Math.round(confidence * 100);

            emotionEl.style.opacity = 0;
            setTimeout(() => {
                emotionEl.textContent = emotion;
                emotionEl.style.color = color;
                emotionEl.style.opacity = 1;
            }, 120);

            barFill.style.width = percent + '%';
            barFill.style.backgroundColor = color;
            confidenceLabel.textContent = `Confidence: ${percent}%`;
        }

        function toggleGallery() {
            document.getElementById('galleryPanel').classList.toggle('open');
        }

        function addToGallery(blob, emotion, confidence) {
            const imageURL = URL.createObjectURL(blob);

            const wrapper = document.createElement('div');

            const thumb = document.createElement('img');
            thumb.src = imageURL;
            thumb.className = 'gallery-thumb';
            thumb.onclick = () => openLightbox(imageURL, emotion, confidence);

            const label = document.createElement('div');
            label.className = 'gallery-item-label';
            label.textContent = `${emotion} (${Math.round(confidence * 100)}%)`;

            wrapper.appendChild(thumb);
            wrapper.appendChild(label);
            gallery.prepend(wrapper);

            const previewCard = document.getElementById('previewCard');
            const previewImg = document.getElementById('previewImg');
            const previewLabel = document.getElementById('previewLabel');

            previewImg.src = imageURL;
            previewImg.onclick = () => openLightbox(imageURL, emotion, confidence);
            previewLabel.textContent = `${emotion} (${Math.round(confidence * 100)}%)`;
            previewCard.style.display = 'block';  
        }

        function openLightbox(imageURL, emotion, confidence) {
            document.getElementById('lightboxImg').src = imageURL;
            document.getElementById('lightboxCaption').textContent =
                `${emotion} — ${Math.round(confidence * 100)}% confidence`;
            document.getElementById('lightboxDownload').href = imageURL;
            document.getElementById('lightboxDownload').download =
                `${emotion}_${Math.round(confidence * 100)}.jpg`;
            document.getElementById('lightbox').classList.add('open');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
        }

        function closeLightboxOnBackdrop(event) {
            if (event.target === event.currentTarget) {
                closeLightbox();
            }
        }

        document.addEventListener('click', (event) => {
            const panel = document.getElementById('galleryPanel');
            const toggleBtn = document.querySelector('.gallery-toggle');
            if (!panel.classList.contains('open')) return;
            const clickedInsidePanel = panel.contains(event.target);
            const clickedToggleBtn = toggleBtn.contains(event.target);

            if (!clickedInsidePanel && !clickedToggleBtn) {
                panel.classList.remove('open');
            }
        });


    </script>
</body>
</html>
