<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Emotion Classifier</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #0f0f14 0%, #1a1a24 100%);
            color: #eee;
            margin: 0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
            color: #f5f5f5;
        }

        .video-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a35;
        }

        video {
            display: block;
            transform: scaleX(-1);
        }

        .live-indicator {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4d4d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%   { opacity: 1; transform: scale(1); }
            50%  { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result-card {
            margin-top: 28px;
            width: 480px;
            max-width: 90vw;
            background: #1c1c26;
            border: 1px solid #2a2a35;
            border-radius: 14px;
            padding: 24px 28px;
            text-align: center;
        }

        #emotion {
            font-size: 32px;
            font-weight: 700;
            transition: opacity 0.25s ease, color 0.25s ease;
        }

        .bar-track {
            margin-top: 16px;
            background: #2a2a35;
            border-radius: 8px;
            height: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        #confidence-label {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
        }

        canvas { display: none; }
    </style>
</head>
<body>
    <h1>Live Emotion Detection</h1>

    <div class="video-wrapper">
        <video id="video" width="480" height="360" autoplay muted></video>
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>LIVE</span>
        </div>
    </div>

    <canvas id="canvas" width="480" height="360"></canvas>

    <div class="result-card">
        <div id="emotion">Waiting for camera...</div>
        <div class="bar-track">
            <div id="bar-fill" class="bar-fill" style="width:0%; background:#555;"></div>
        </div>
        <div id="confidence-label"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const emotionEl = document.getElementById('emotion');
        const barFill = document.getElementById('bar-fill');
        const confidenceLabel = document.getElementById('confidence-label');

        const emotionColors = {
            Angry: '#e05c5c', Disgust: '#8bc34a', Fear: '#9b6dd6',
            Happy: '#f5c518', Sad: '#5b56a8', Surprise: '#619ee8', Neutral: '#ffffff',
        };

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                emotionEl.textContent = "Detecting...";
            })
            .catch(err => {
                emotionEl.textContent = "Camera access denied or unavailable.";
                console.error(err);
            });

        setInterval(() => { captureAndPredict(); }, 1000);

        function captureAndPredict() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => { sendToServer(blob); }, 'image/jpeg');
        }

        async function sendToServer(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'frame.jpg');
            try {
                const response = await fetch('/predict', { method: 'POST', body: formData });
                const data = await response.json();
                updateUI(data.Emotion, data.confidence);
            } catch (err) {
                emotionEl.textContent = "Error contacting server.";
                console.error(err);
            }
        }

        function updateUI(emotion, confidence) {
            const color = emotionColors[emotion] || '#eee';
            const percent = Math.round(confidence * 100);

            emotionEl.style.opacity = 0;
            setTimeout(() => {
                emotionEl.textContent = emotion;
                emotionEl.style.color = color;
                emotionEl.style.opacity = 1;
            }, 120);

            barFill.style.width = percent + '%';
            barFill.style.backgroundColor = color;
            confidenceLabel.textContent = `Confidence: ${percent}%`;
        }
    </script>
</body>
</html>
